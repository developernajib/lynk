# Air hot reload for the core worker: air -c .air.worker.toml
root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o tmp/worker.exe ./cmd/worker"
bin = "tmp/worker.exe"
include_ext = ["go", "env"]
exclude_dir = ["tmp", "bin"]
stop_on_error = true

[log]
main_only = true

[misc]
clean_on_exit = true
