// Identity contract: registration, session lifecycle, and account
// management. Access tokens are short-lived RS256 JWTs verified at the
// gateway; refresh tokens are opaque, stored hashed, and ROTATE on every
// use, so a stolen refresh token dies the moment either party uses it.
syntax = "proto3";

package identity.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/developernajib/lynk/services/core/internal/gen/proto/identity/v1;identityv1";

// IdentityService owns users and their sessions.
service IdentityService {
  // Register creates a user account.
  rpc Register(RegisterRequest) returns (RegisterResponse);
  // Login exchanges credentials for an access + refresh token pair.
  rpc Login(LoginRequest) returns (LoginResponse);
  // Refresh rotates a refresh token, revoking the presented one.
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
  // Logout revokes the refresh token and blacklists the access token.
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  // GetProfile returns the authenticated user's profile.
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
  // ChangePassword re-authenticates, changes the password, and revokes
  // every session.
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  // SetUserRole changes a user's role attribute (admin only).
  rpc SetUserRole(SetUserRoleRequest) returns (SetUserRoleResponse);
  // RequestPasswordReset emails a one-time code; always succeeds so
  // responses cannot reveal whether an account exists.
  rpc RequestPasswordReset(RequestPasswordResetRequest) returns (RequestPasswordResetResponse);
  // ResetPassword consumes the code, sets the password, and revokes every
  // session.
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);
  // RequestEmailVerification sends the caller a one-time code.
  rpc RequestEmailVerification(RequestEmailVerificationRequest) returns (RequestEmailVerificationResponse);
  // VerifyEmail consumes the code and marks the caller's email verified.
  rpc VerifyEmail(VerifyEmailRequest) returns (VerifyEmailResponse);
  // CreateAPIKey mints a machine credential; the full key is returned
  // exactly once.
  rpc CreateAPIKey(CreateAPIKeyRequest) returns (CreateAPIKeyResponse);
  // ListAPIKeys lists the caller's keys (metadata only, never the secret).
  rpc ListAPIKeys(ListAPIKeysRequest) returns (ListAPIKeysResponse);
  // RevokeAPIKey permanently disables one of the caller's keys.
  rpc RevokeAPIKey(RevokeAPIKeyRequest) returns (RevokeAPIKeyResponse);
  // ValidateAPIKey resolves a presented key to its principal; for
  // service-side machine authentication.
  rpc ValidateAPIKey(ValidateAPIKeyRequest) returns (ValidateAPIKeyResponse);
}

// User is the public profile shape.
message User {
  // id is the user's UUIDv7.
  string id = 1;
  // email is the login identifier.
  string email = 2;
  // full_name is the display name.
  string full_name = 3;
  // role is a subject attribute for authorization policies.
  string role = 4;
}

// RegisterRequest carries the new account's details.
message RegisterRequest {
  // email must be a valid address; stored lowercase.
  string email = 1 [(buf.validate.field).string.email = true];
  // password must be 10-200 characters; strength beats composition rules.
  string password = 2 [(buf.validate.field).string = {min_len: 10, max_len: 200}];
  // full_name is the display name.
  string full_name = 3 [(buf.validate.field).string = {min_len: 1, max_len: 200}];
}

// RegisterResponse returns the created user.
message RegisterResponse {
  // user is the new account.
  User user = 1;
}

// LoginRequest carries credentials.
message LoginRequest {
  // email is the login identifier.
  string email = 1 [(buf.validate.field).string.email = true];
  // password is verified against the stored hash.
  string password = 2 [(buf.validate.field).string = {min_len: 1, max_len: 200}];
}

// LoginResponse returns the token pair plus the profile, saving the client a
// second round-trip.
message LoginResponse {
  // access_token is the short-lived RS256 JWT.
  string access_token = 1;
  // access_token_expires_at is its Unix expiry (seconds).
  int64 access_token_expires_at = 2;
  // refresh_token is opaque; present it to Refresh exactly once.
  string refresh_token = 3;
  // user is the authenticated profile.
  User user = 4;
}

// RefreshRequest presents the current refresh token.
message RefreshRequest {
  // refresh_token is consumed and revoked by this call.
  string refresh_token = 1 [(buf.validate.field).string.min_len = 1];
}

// RefreshResponse returns a fresh pair.
message RefreshResponse {
  // access_token is the new RS256 JWT.
  string access_token = 1;
  // access_token_expires_at is its Unix expiry (seconds).
  int64 access_token_expires_at = 2;
  // refresh_token replaces the presented one.
  string refresh_token = 3;
}

// LogoutRequest ends the session.
message LogoutRequest {
  // refresh_token is revoked.
  string refresh_token = 1 [(buf.validate.field).string.min_len = 1];
  // access_token_id (jti) is blacklisted until its natural expiry.
  string access_token_id = 2;
}

// LogoutResponse is empty; success is the status code.
message LogoutResponse {}

// GetProfileRequest is empty; identity comes from the verified principal.
message GetProfileRequest {}

// GetProfileResponse returns the caller's profile.
message GetProfileResponse {
  // user is the authenticated profile.
  User user = 1;
}

// ChangePasswordRequest re-authenticates with the current password.
message ChangePasswordRequest {
  // current_password proves possession before the change.
  string current_password = 1 [(buf.validate.field).string.min_len = 1];
  // new_password must be 10-200 characters.
  string new_password = 2 [(buf.validate.field).string = {min_len: 10, max_len: 200}];
}

// ChangePasswordResponse is empty; all sessions are revoked on success.
message ChangePasswordResponse {}

// SetUserRoleRequest names the user and the role to assign.
message SetUserRoleRequest {
  // user_id is the target user's UUID.
  string user_id = 1 [(buf.validate.field).string.uuid = true];
  // role is the new role attribute, e.g. "admin" or "user".
  string role = 2 [(buf.validate.field).string = {min_len: 1, max_len: 50}];
}

// SetUserRoleResponse returns the updated user.
message SetUserRoleResponse {
  // user reflects the new role.
  User user = 1;
}

// RequestPasswordResetRequest names the account by email.
message RequestPasswordResetRequest {
  // email of the account; unknown addresses get the same response.
  string email = 1 [(buf.validate.field).string.email = true];
}

// RequestPasswordResetResponse is empty regardless of account existence.
message RequestPasswordResetResponse {}

// ResetPasswordRequest carries the emailed code and the new password.
message ResetPasswordRequest {
  // email of the account.
  string email = 1 [(buf.validate.field).string.email = true];
  // code is the one-time code from the email.
  string code = 2 [(buf.validate.field).string.len = 6];
  // new_password must be 10-200 characters.
  string new_password = 3 [(buf.validate.field).string = {min_len: 10, max_len: 200}];
}

// ResetPasswordResponse is empty; all sessions are revoked on success.
message ResetPasswordResponse {}

// RequestEmailVerificationRequest is empty; identity comes from the caller.
message RequestEmailVerificationRequest {}

// RequestEmailVerificationResponse is empty.
message RequestEmailVerificationResponse {}

// VerifyEmailRequest carries the emailed code.
message VerifyEmailRequest {
  // code is the one-time code from the email.
  string code = 1 [(buf.validate.field).string.len = 6];
}

// VerifyEmailResponse is empty; success marks the email verified.
message VerifyEmailResponse {}

// APIKey is a machine credential's metadata; the secret never appears here.
message APIKey {
  // id identifies the key for revocation.
  string id = 1;
  // name is the caller-chosen label.
  string name = 2;
  // prefix is the displayable hint, e.g. "lynk_AB12".
  string prefix = 3;
  // created_at is when the key was minted (Unix seconds).
  int64 created_at = 4;
  // revoked is whether the key has been disabled.
  bool revoked = 5;
}

// CreateAPIKeyRequest names the new key.
message CreateAPIKeyRequest {
  // name labels the key, e.g. "ci-deployer".
  string name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 100}];
}

// CreateAPIKeyResponse returns the secret exactly once.
message CreateAPIKeyResponse {
  // api_key is the metadata record.
  APIKey api_key = 1;
  // key is the full secret; it is never retrievable again.
  string key = 2;
}

// ListAPIKeysRequest is empty; identity comes from the caller.
message ListAPIKeysRequest {}

// ListAPIKeysResponse returns the caller's keys.
message ListAPIKeysResponse {
  // api_keys is the metadata list.
  repeated APIKey api_keys = 1;
}

// RevokeAPIKeyRequest names the key to disable.
message RevokeAPIKeyRequest {
  // id of the key; must belong to the caller.
  string id = 1 [(buf.validate.field).string.uuid = true];
}

// RevokeAPIKeyResponse is empty; success is the status code.
message RevokeAPIKeyResponse {}

// ValidateAPIKeyRequest presents a key for validation.
message ValidateAPIKeyRequest {
  // key is the full secret.
  string key = 1 [(buf.validate.field).string.min_len = 1];
}

// ValidateAPIKeyResponse resolves the key's principal.
message ValidateAPIKeyResponse {
  // user_id owns the key.
  string user_id = 1;
  // role is the owner's role attribute.
  string role = 2;
}
