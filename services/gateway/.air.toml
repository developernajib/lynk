# Air hot reload for the gateway. Install: go install github.com/air-verse/air@latest
root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o tmp/gateway.exe ./cmd/server"
bin = "tmp/gateway.exe"
include_ext = ["go", "env"]
exclude_dir = ["tmp", "bin"]
stop_on_error = true

[log]
main_only = true

[misc]
clean_on_exit = true
