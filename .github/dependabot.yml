# Automated dependency PRs: one ecosystem per entry, weekly, so upgrades are
# deliberate reviews instead of silent drift.
version: 2

updates:
  - package-ecosystem: gomod
    directory: /services/core
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: gomod
    directory: /services/gateway
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      npm-deps:
        patterns: ["*"]

  - package-ecosystem: docker
    directories:
      - /services/core
      - /services/gateway
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
