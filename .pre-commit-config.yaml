# Pre-commit hooks: hygiene checks plus per-module Go checks on changed
# files. Install once with `make hooks` (requires the pre-commit tool).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      # Blocks commits containing credentials, tokens, or private keys.
      - id: gitleaks

  - repo: local
    hooks:
      - id: go-check-changed
        name: go fmt/vet changed modules
        entry: scripts/go-check-changed.sh
        language: script
        files: '\.go$'
        pass_filenames: true
